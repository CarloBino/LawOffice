services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: law-office-web:local
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      PORT: 8080
      APP_URL: http://localhost:8080
      ASSET_URL: http://localhost:8080
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: lawoffice
      DB_USERNAME: lawoffice
      DB_PASSWORD: secret

  db:
    image: mysql:8.4
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: lawoffice
      MYSQL_USER: lawoffice
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql-data:
